<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Washing Machine Issues</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Washing Machine Issues</h1>

  <p>Please select the problem you're facing:</p>

  <form action="final.html" method="get">
    <label for="problem-select">Choose a problem:</label>
    <select id="problem-select" name="problem">
      <option value="Machine not spinning">Machine not spinning</option>
      <option value="Clothes not cleaning properly">Clothes not cleaning properly</option>
      <option value="Water not draining">Water not draining</option>
    </select>

    <br><br>

    <label for="custom-problem">Describe your problem here:</label><br>
    <textarea id="custom-problem" name="customProblem" rows="4" cols="50" placeholder="Describe your issue..."></textarea>

    <br><br>

    <button type="submit">Submit Complaint</button>
  </form>
</body>
</html>
